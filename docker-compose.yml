services:
  stream:
    build: ./preprocessing
    ports:
      - "8765:8765"
    volumes:
      - ./preprocessing:/app
    command:
      - python
      - ws_server.py
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --interval
      - "0.033"
      - --input
      - /app/predicted_input.json
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    environment:
      SEGMENTATION_URL: http://segmentation:8000
      STREAM_URL: http://stream:8765
      ORCHESTRATOR_CALIBRATION_PATH: /data/calibration.json
      ORCHESTRATOR_DEFAULT_CALIBRATION: /app/default_calibration.json
    ports:
      - "8090:8090"
    volumes:
      - ./preprocessing/geometry_sidecar_example.json:/app/default_calibration.json:ro
      - ./orchestrator/data:/data
    depends_on:
      - segmentation
      - stream
    restart: unless-stopped

  segmentation:
    build: ./segmentation
    environment:
      SEGMENTATION_WEIGHTS: ${SEGMENTATION_WEIGHTS:-runs/segment/forceps/weights/best.pt}
      SEGMENTATION_CONF: ${SEGMENTATION_CONF:-0.25}
      SEGMENTATION_IMGSZ: ${SEGMENTATION_IMGSZ:-1024}
      SEGMENTATION_DEVICE: ${SEGMENTATION_DEVICE:-cpu}
      SEGMENTATION_PREPROCESS_PRESET: ${SEGMENTATION_PREPROCESS_PRESET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./segmentation/runs:/app/runs:ro
    restart: unless-stopped

  viz:
    build:
      context: ./microforceps-viz
      args:
        VITE_DEFAULT_SOURCE: live
    ports:
      - "8080:80"
    depends_on:
      - stream
    restart: unless-stopped
