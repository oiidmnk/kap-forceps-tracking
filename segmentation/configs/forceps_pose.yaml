# YOLO pose dataset config for forceps and shadow keypoints.
path: ./data
train: images/train
val: images/val

nc: 2
names:
  0: forceps
  1: shadow

# Keypoint order:
#   forceps: 0 = tip_left, 1 = tip_right, 2 = jaw_root
#   shadow:  0 = shadow_left, 1 = shadow_right, 2 = shadow_root
kpt_shape: [3, 3]
flip_idx: [1, 0, 2]
